<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Repo Map</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111113;
      --bg-soft: #19191f;
      --surface: #20202a;
      --surface-strong: #282834;
      --text: #f1f0f7;
      --muted: #a7a4b8;
      --subtle: #77728b;
      --line: #343142;
      --violet: #8b5cf6;
      --violet-soft: #6d5bd0;
      --cyan: #22d3ee;
      --green: #34d399;
      --amber: #fbbf24;
      --pink: #f472b6;
      --blue: #60a5fa;
      --shadow: 0 22px 50px rgba(0, 0, 0, 0.38);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "Segoe UI", system-ui, sans-serif;
      letter-spacing: 0;
    }

    button {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      width: 100%;
      height: 100%;
      min-width: 320px;
      background:
        radial-gradient(circle at 18% 18%, rgba(139, 92, 246, 0.16), transparent 28%),
        linear-gradient(180deg, #15151b 0%, #101012 100%);
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(25, 25, 31, 0.92);
      backdrop-filter: blur(10px);
    }

    .title {
      min-width: 0;
    }

    .title strong,
    .title span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .title strong {
      font-size: 14px;
      line-height: 20px;
    }

    .title span {
      color: var(--muted);
      font-size: 12px;
      line-height: 17px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .button {
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 11px;
      color: var(--text);
      background: var(--surface);
      cursor: pointer;
    }

    .button:disabled {
      color: var(--subtle);
      cursor: default;
      opacity: 0.6;
    }

    .button:not(:disabled):hover {
      border-color: var(--violet);
      background: var(--surface-strong);
    }

    .stage {
      position: relative;
      min-height: 0;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
      user-select: none;
      touch-action: none;
    }

    svg:active {
      cursor: grabbing;
    }

    .scene {
      will-change: transform;
    }

    .edge {
      fill: none;
      opacity: 1;
      stroke: rgba(167, 164, 184, 0.22);
      stroke-width: 1.5;
      transition: opacity 220ms ease;
    }

    .bubble {
      cursor: pointer;
      outline: none;
      opacity: 1;
      transition: opacity 220ms ease;
    }

    .bubble circle {
      fill: color-mix(in srgb, var(--cluster-color) 26%, var(--surface));
      stroke: var(--cluster-color);
      stroke-width: 2.5;
      filter: drop-shadow(0 14px 24px rgba(0, 0, 0, 0.36));
      transition: r 160ms ease, stroke-width 160ms ease, filter 160ms ease;
    }

    .bubble:hover circle,
    .bubble:focus-visible circle {
      stroke-width: 4;
      filter: drop-shadow(0 0 22px color-mix(in srgb, var(--cluster-color) 42%, transparent));
    }

    .bubble text {
      fill: var(--text);
      font-size: 13px;
      font-weight: 650;
      paint-order: stroke;
      pointer-events: none;
      stroke: rgba(17, 17, 19, 0.88);
      stroke-linejoin: round;
      stroke-width: 5px;
      text-anchor: middle;
    }

    .bubble .kind {
      fill: var(--muted);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .ghost {
      fill: none;
      stroke: rgba(139, 92, 246, 0.24);
      stroke-dasharray: 7 10;
      stroke-width: 1.5;
    }

    .status {
      position: absolute;
      left: 14px;
      bottom: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: calc(100% - 28px);
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
      color: var(--muted);
      background: rgba(32, 32, 42, 0.86);
      box-shadow: var(--shadow);
      font-size: 12px;
      line-height: 16px;
      backdrop-filter: blur(8px);
    }

    .panel {
      position: absolute;
      right: 14px;
      bottom: 14px;
      width: min(360px, calc(100% - 28px));
      max-height: calc(100% - 28px);
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: rgba(32, 32, 42, 0.9);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .panel h2 {
      margin: 0 0 4px;
      font-size: 16px;
      line-height: 22px;
    }

    .panel .kind {
      margin-bottom: 10px;
      color: var(--violet);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .panel p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 19px;
    }

    @media (max-width: 700px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      .controls {
        justify-content: flex-start;
      }

      .panel {
        left: 10px;
        right: 10px;
        bottom: 52px;
        width: auto;
      }

      .status {
        left: 10px;
        bottom: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="toolbar">
      <div class="title">
        <strong id="viewTitle">Repo Map</strong>
        <span id="breadcrumb">Repository overview</span>
      </div>
      <div class="controls">
        <button id="prevLevel" class="button" type="button" title="Previous level">←</button>
        <button id="nextLevel" class="button" type="button" title="Next level">→</button>
        <button id="up" class="button" type="button">Up</button>
        <button id="home" class="button" type="button">Home</button>
      </div>
    </header>

    <section class="stage" aria-label="Repository map">
      <svg id="map" role="img" aria-label="Interactive repository map"></svg>
      <div class="status">
        <div id="levelLabel" class="pill"></div>
        <div id="hintLabel" class="pill"></div>
      </div>
      <aside class="panel" aria-live="polite">
        <h2 id="selectedName"></h2>
        <div id="selectedKind" class="kind"></div>
        <p id="selectedSummary"></p>
      </aside>
    </section>
  </main>

  <script>
    const repoTree = __REPO_TREE_JSON__;
    const clusterColors = ["#8b5cf6", "#22d3ee", "#34d399", "#fbbf24", "#f472b6", "#60a5fa"];
    const svg = document.getElementById("map");
    const viewport = document.createElementNS("http://www.w3.org/2000/svg", "g");
    const edgesLayer = document.createElementNS("http://www.w3.org/2000/svg", "g");
    const nodesLayer = document.createElementNS("http://www.w3.org/2000/svg", "g");
    const prevLevelButton = document.getElementById("prevLevel");
    const nextLevelButton = document.getElementById("nextLevel");
    const upButton = document.getElementById("up");
    const homeButton = document.getElementById("home");

    viewport.setAttribute("class", "scene");
    svg.appendChild(viewport);
    viewport.append(edgesLayer, nodesLayer);

    const state = {
      viewLabel: "repository",
      visibleNodes: [],
      selected: null,
      scale: 1,
      x: 0,
      y: 0,
      dragging: false,
      lastPointer: null,
      dragStarted: false,
      suppressClickUntil: 0,
      animationFrame: null
    };

    function normalize(node, parent = null, depth = 0, index = 0, path = []) {
      const entry = {
        ...node,
        parent,
        depth,
        index,
        path: [...path, node.name],
        children: []
      };
      entry.children = (node.children || []).map((child, childIndex) =>
        normalize(child, entry, depth + 1, childIndex, entry.path)
      );
      return entry;
    }

    const root = normalize(repoTree);
    state.visibleNodes = [root];
    state.selected = root;

    function allNodes() {
      const result = [];
      const visit = (node) => {
        result.push(node);
        node.children.forEach(visit);
      };
      visit(root);
      return result;
    }

    const maxDepth = Math.max(...allNodes().map((node) => node.depth));

    function enterNode(node, direction = 1) {
      if (!node.children.length) {
        state.selected = node;
        updateDetails();
        return;
      }

      state.visibleNodes = node.children;
      state.selected = node.children[0] || node;
      state.viewLabel = `children of ${node.name}`;
      render(direction);
    }

    function showPreviousLevel() {
      const parents = uniqueNodes(state.visibleNodes.map((node) => node.parent).filter(Boolean));
      if (!parents.length) {
        return;
      }

      state.visibleNodes = parents;
      state.selected = parents[0];
      state.viewLabel = parents.length === 1 && parents[0] === root
        ? "repository"
        : `level ${parents[0].depth + 1}`;
      render(-1);
    }

    function showNextLevel() {
      const children = state.visibleNodes.flatMap((node) => node.children);
      if (!children.length) {
        return;
      }

      state.visibleNodes = children;
      state.selected = children[0];
      state.viewLabel = `level ${children[0].depth + 1}`;
      render(1);
    }

    function uniqueNodes(nodes) {
      return [...new Set(nodes)];
    }

    function goHome() {
      state.visibleNodes = [root];
      state.selected = root;
      state.viewLabel = "repository";
      render(-1);
    }

    function colorFor(node) {
      if (!node.parent) {
        return clusterColors[0];
      }
      return clusterColors[node.parent.index % clusterColors.length];
    }

    function layout(nodes) {
      const width = svg.clientWidth || 900;
      const height = svg.clientHeight || 640;
      const centerX = width / 2;
      const centerY = height / 2;

      if (nodes.length === 1) {
        nodes[0].x = centerX;
        nodes[0].y = centerY;
        nodes[0].r = Math.min(118, Math.max(74, Math.min(width, height) * 0.16));
        return;
      }

      const clusterCount = uniqueNodes(nodes.map((node) => node.parent).filter(Boolean)).length || 1;
      const spread = Math.min(width, height) * Math.min(0.38, 0.2 + nodes.length * 0.012);
      const radius = Math.min(82, Math.max(24, Math.min(width, height) / (Math.sqrt(nodes.length) * 5.5 + 4)));
      nodes.forEach((node, index) => {
        const clusterIndex = node.parent ? uniqueNodes(nodes.map((item) => item.parent).filter(Boolean)).indexOf(node.parent) : 0;
        const siblings = nodes.filter((item) => item.parent === node.parent);
        const siblingIndex = siblings.indexOf(node);
        const clusterAngle = (Math.PI * 2 * clusterIndex) / clusterCount - Math.PI / 2;
        const localAngle = (Math.PI * 2 * siblingIndex) / Math.max(siblings.length, 1) - Math.PI / 2;
        const clusterX = centerX + Math.cos(clusterAngle) * (clusterCount === 1 ? 0 : spread * 0.72);
        const clusterY = centerY + Math.sin(clusterAngle) * (clusterCount === 1 ? 0 : spread * 0.72);
        const localSpread = Math.min(spread * 0.38, Math.max(80, radius * 1.8));
        node.x = clusterX + Math.cos(localAngle) * (siblings.length === 1 ? 0 : localSpread);
        node.y = clusterY + Math.sin(localAngle) * (siblings.length === 1 ? 0 : localSpread);
        node.r = radius;
      });
    }

    function clear() {
      edgesLayer.replaceChildren();
      nodesLayer.replaceChildren();
    }

    function renderEdges(nodes) {
      const groups = uniqueNodes(nodes.map((node) => node.parent).filter(Boolean))
        .map((parent) => nodes.filter((node) => node.parent === parent));

      groups.forEach((group) => {
        if (group.length < 2) {
          return;
        }
        for (let index = 0; index < group.length; index += 1) {
          const source = group[index];
          const target = group[(index + 1) % group.length];
          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          path.setAttribute("class", "edge");
          path.setAttribute("d", `M ${source.x} ${source.y} L ${target.x} ${target.y}`);
          path.style.opacity = "0";
          edgesLayer.appendChild(path);
          requestAnimationFrame(() => {
            path.style.opacity = "1";
          });
        }
      });
    }

    function renderNodes(nodes, direction) {
      nodes.forEach((node) => {
        const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
        group.setAttribute("class", "bubble");
        group.setAttribute("transform", `translate(${node.x}, ${node.y})`);
        group.style.setProperty("--cluster-color", colorFor(node));
        group.style.opacity = "0";
        group.tabIndex = 0;

        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("r", String(node.r));

        const name = document.createElementNS("http://www.w3.org/2000/svg", "text");
        name.setAttribute("y", "-2");
        name.textContent = truncateLabel(node.name, node.r);

        const kind = document.createElementNS("http://www.w3.org/2000/svg", "text");
        kind.setAttribute("class", "kind");
        kind.setAttribute("y", "19");
        kind.textContent = node.children.length ? `${node.kind || "node"} / ${node.children.length}` : node.kind || "leaf";

        group.append(circle, name, kind);
        group.addEventListener("click", () => {
          if (performance.now() < state.suppressClickUntil) {
            return;
          }
          enterNode(node);
        });
        group.addEventListener("pointerenter", () => {
          state.selected = node;
          updateDetails();
        });
        group.addEventListener("focus", () => {
          state.selected = node;
          updateDetails();
        });
        group.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            enterNode(node);
          }
          if (event.key === "Escape") {
            goUp();
          }
        });

        nodesLayer.appendChild(group);
        requestAnimationFrame(() => {
          group.style.opacity = "1";
          group.animate(
            [
              { transform: `translate(${direction * 18}px, 0) scale(0.96)`, opacity: 0 },
              { transform: "translate(0, 0) scale(1)", opacity: 1 }
            ],
            { duration: 260, easing: "cubic-bezier(.2,.8,.2,1)" }
          );
        });
      });
    }

    function truncateLabel(label, radius) {
      const maxCharacters = Math.max(8, Math.floor(radius / 4.4));
      if (label.length <= maxCharacters) {
        return label;
      }
      return `${label.slice(0, maxCharacters - 1)}...`;
    }

    function updateDetails() {
      document.getElementById("viewTitle").textContent = repoTree.name;
      document.getElementById("breadcrumb").textContent = `${state.viewLabel} / ${state.visibleNodes.length} visible`;
      document.getElementById("selectedName").textContent = state.selected.name;
      document.getElementById("selectedKind").textContent = state.selected.kind || "node";
      document.getElementById("selectedSummary").textContent =
        state.selected.summary || "No summary available yet.";
      document.getElementById("levelLabel").textContent = `Depth ${state.visibleNodes[0].depth + 1} of ${maxDepth + 1}`;
      document.getElementById("hintLabel").textContent = "Click enters a node. Left/Right change level. Wheel zooms. Drag pans.";
      prevLevelButton.disabled = !state.visibleNodes.some((node) => node.parent);
      nextLevelButton.disabled = !state.visibleNodes.some((node) => node.children.length);
      upButton.disabled = prevLevelButton.disabled;
    }

    function resetViewport() {
      animateViewport({ scale: 1, x: 0, y: 0 }, 260);
    }

    function render(direction = 1) {
      clear();
      layout(state.visibleNodes);
      renderEdges(state.visibleNodes);
      renderNodes(state.visibleNodes, direction);
      updateDetails();
      resetViewport();
    }

    function updateViewport() {
      viewport.setAttribute("transform", `translate(${state.x}, ${state.y}) scale(${state.scale})`);
    }

    function animateViewport(target, duration = 180) {
      cancelAnimationFrame(state.animationFrame);
      const start = { scale: state.scale, x: state.x, y: state.y };
      const startedAt = performance.now();
      const ease = (value) => 1 - Math.pow(1 - value, 3);

      function tick(now) {
        const progress = Math.min(1, (now - startedAt) / duration);
        const eased = ease(progress);
        state.scale = start.scale + (target.scale - start.scale) * eased;
        state.x = start.x + (target.x - start.x) * eased;
        state.y = start.y + (target.y - start.y) * eased;
        updateViewport();

        if (progress < 1) {
          state.animationFrame = requestAnimationFrame(tick);
        }
      }

      state.animationFrame = requestAnimationFrame(tick);
    }

    svg.addEventListener("wheel", (event) => {
      event.preventDefault();
      const direction = event.deltaY > 0 ? -1 : 1;
      const nextScale = Math.min(4, Math.max(0.45, state.scale + direction * 0.16));
      const rect = svg.getBoundingClientRect();
      const px = event.clientX - rect.left;
      const py = event.clientY - rect.top;
      const worldX = (px - state.x) / state.scale;
      const worldY = (py - state.y) / state.scale;
      animateViewport({
        scale: nextScale,
        x: px - worldX * nextScale,
        y: py - worldY * nextScale
      }, 130);
    }, { passive: false });

    svg.addEventListener("pointerdown", (event) => {
      state.dragging = true;
      state.dragStarted = false;
      state.lastPointer = { x: event.clientX, y: event.clientY };
      svg.setPointerCapture(event.pointerId);
    });

    svg.addEventListener("pointermove", (event) => {
      if (!state.dragging || !state.lastPointer) {
        return;
      }

      const dx = event.clientX - state.lastPointer.x;
      const dy = event.clientY - state.lastPointer.y;
      if (Math.abs(dx) + Math.abs(dy) > 1) {
        state.dragStarted = true;
      }
      state.x += dx;
      state.y += dy;
      state.lastPointer = { x: event.clientX, y: event.clientY };
      updateViewport();
    });

    svg.addEventListener("pointerup", () => {
      if (state.dragStarted) {
        state.suppressClickUntil = performance.now() + 220;
      }
      state.dragging = false;
      state.lastPointer = null;
      setTimeout(() => {
        state.dragStarted = false;
      }, 0);
    });

    prevLevelButton.addEventListener("click", showPreviousLevel);
    nextLevelButton.addEventListener("click", showNextLevel);
    upButton.addEventListener("click", showPreviousLevel);
    homeButton.addEventListener("click", goHome);
    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") {
        showPreviousLevel();
      }
      if (event.key === "ArrowRight") {
        showNextLevel();
      }
    });
    window.addEventListener("resize", () => render(0));

    render();
  </script>
</body>
</html>
