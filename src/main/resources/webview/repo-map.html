<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Repo Map</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f8f4;
      --surface: #ffffff;
      --text: #202124;
      --muted: #687078;
      --line: #d9ded7;
      --accent: #0f766e;
      --accent-2: #c2410c;
      --accent-3: #2563eb;
      --shadow: 0 14px 34px rgba(30, 35, 40, 0.12);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #171a1d;
        --surface: #20252a;
        --text: #edf1f4;
        --muted: #a5adb5;
        --line: #364049;
        --shadow: 0 14px 34px rgba(0, 0, 0, 0.3);
      }
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "Segoe UI", system-ui, sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      width: 100%;
      height: 100%;
      min-width: 320px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .title {
      min-width: 0;
    }

    .title strong,
    .title span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .title strong {
      font-size: 14px;
      line-height: 20px;
    }

    .title span {
      color: var(--muted);
      font-size: 12px;
      line-height: 16px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
    }

    .search {
      width: min(240px, 32vw);
      min-width: 140px;
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      color: var(--text);
      background: var(--bg);
      outline: none;
    }

    .button {
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 11px;
      color: var(--text);
      background: var(--surface);
      cursor: pointer;
    }

    .button:hover {
      border-color: var(--accent);
    }

    .button.hidden {
      display: none;
    }

    select.button {
      cursor: pointer;
    }

    .detail-label {
      align-self: center;
      color: var(--muted);
      font-size: 12px;
    }

    .stage {
      position: relative;
      min-height: 0;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
      user-select: none;
    }

    svg:active {
      cursor: grabbing;
    }

    .link {
      fill: none;
      stroke: var(--line);
      stroke-width: 2;
    }

    .link.dep {
      stroke: var(--accent-2);
      stroke-width: 1.6;
      stroke-opacity: 0.7;
      marker-end: url(#arrow);
    }

    .node circle {
      fill: var(--surface);
      stroke: var(--accent-3);
      stroke-width: 2;
      filter: drop-shadow(0 3px 5px rgba(30, 35, 40, 0.18));
    }

    .node[data-kind="module"] circle {
      stroke: var(--accent);
    }

    .node[data-kind="feature"] circle {
      stroke: var(--accent-2);
    }

    .node[data-kind="module"] { cursor: pointer; }

    .node text {
      fill: var(--text);
      font-size: 12px;
      paint-order: stroke;
      stroke: var(--bg);
      stroke-width: 4px;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .node.selected circle {
      stroke-width: 4;
    }

    .node.dim {
      opacity: 0.22;
    }

    .panel {
      position: absolute;
      right: 14px;
      bottom: 14px;
      width: min(360px, calc(100% - 28px));
      max-height: calc(100% - 28px);
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: color-mix(in srgb, var(--surface) 94%, transparent);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .panel h2 {
      margin: 0 0 4px;
      font-size: 16px;
      line-height: 22px;
    }

    .panel .kind {
      margin-bottom: 10px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .panel p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 19px;
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }


    .stats {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 640px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      .controls {
        justify-content: flex-start;
      }

      .search {
        width: 100%;
      }

      .panel {
        left: 10px;
        right: 10px;
        bottom: 10px;
        width: auto;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="toolbar">
      <div class="title">
        <strong id="repoName">Repo Map</strong>
        <span id="breadcrumb">Repository overview</span>
      </div>
      <div class="controls">
        <button id="back" class="button hidden" type="button">← Back</button>
        <label class="detail-label" for="detail">Detail</label>
        <select id="detail" class="button" title="Level of detail"></select>
        <input id="search" class="search" type="search" placeholder="Search nodes">
        <button id="reset" class="button" type="button">Reset</button>
        <button id="fit" class="button" type="button">Fit</button>
      </div>
    </header>

    <section class="stage" aria-label="Repository map">
      <svg id="map" role="img" aria-label="Interactive repository map">
        <defs>
          <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-2)"></path>
          </marker>
        </defs>
      </svg>
      <aside class="panel" aria-live="polite">
        <h2 id="selectedName"></h2>
        <div id="selectedKind" class="kind"></div>
        <p id="selectedParent" class="hint"></p>
        <p id="selectedSummary"></p>
        <p id="hint" class="hint"></p>
        <div class="stats">
          <span id="nodeCount"></span>
          <span id="depthCount"></span>
        </div>
      </aside>
    </section>
  </main>

  <script>
    const repoTree = __REPO_TREE_JSON__;
    const repoEdges = __REPO_EDGES_JSON__;

    const svg = document.getElementById("map");
    const viewport = document.createElementNS("http://www.w3.org/2000/svg", "g");
    const linksLayer = document.createElementNS("http://www.w3.org/2000/svg", "g");
    const nodesLayer = document.createElementNS("http://www.w3.org/2000/svg", "g");
    const search = document.getElementById("search");
    const resetButton = document.getElementById("reset");
    const fitButton = document.getElementById("fit");
    const backButton = document.getElementById("back");
    const detail = document.getElementById("detail");

    svg.appendChild(viewport);
    viewport.appendChild(linksLayer);
    viewport.appendChild(nodesLayer);

    const state = {
      scale: 1,
      x: 0,
      y: 0,
      selected: null,
      dragging: false,
      lastPointer: null
    };

    // ---- Index the full tree (root excluded). Each node knows its top-level group. ----
    const indexByPath = new Map(); // path -> { node, group }
    (repoTree.children || []).forEach((group) => indexSubtree(group, group.name));

    function indexSubtree(node, group) {
      indexByPath.set(node.path, { node, group });
      (node.children || []).forEach((child) => indexSubtree(child, group));
    }

    function collectLeafClasses(node, acc) {
      (node.children || []).forEach((child) => {
        if (child.kind === "class") acc.push(child);
        else collectLeafClasses(child, acc);
      });
      return acc;
    }

    // ---- Per-group colors. Every class/subgroup is colored by its top-level group. ----
    const PALETTE = [
      "#2563eb", "#0f766e", "#c2410c", "#7c3aed", "#db2777",
      "#0891b2", "#65a30d", "#ca8a04", "#dc2626", "#475569"
    ];
    const groupColors = new Map();
    (repoTree.children || []).forEach((group, index) => {
      groupColors.set(group.name, PALETTE[index % PALETTE.length]);
    });

    function groupNameFor(node) {
      if (node.group) return node.group;
      const entry = indexByPath.get(node.path);
      return entry ? entry.group : null;
    }

    function colorFor(node) {
      const name = groupNameFor(node);
      return (name && groupColors.get(name)) || "#7a8794";
    }


    // ---- View state ----
    let view = "overview";          // "overview" | "focus"
    let overviewLevel = 1;          // depth band shown in overview (1 = groups); or "all"
    let focusPath = null;
    let focusName = null;

    const nodes = [];
    const links = [];

    function fullDepth(node, depth = 0) {
      const kids = node.children || [];
      if (!kids.length) return depth;
      return Math.max(...kids.map((child) => fullDepth(child, depth + 1)));
    }

    const treeDepth = fullDepth(repoTree); // root=0, groups=1, ...

    function populateDetail() {
      detail.innerHTML = "";
      for (let d = 1; d <= treeDepth; d += 1) {
        const option = document.createElement("option");
        option.value = String(d);
        option.textContent = "Level " + d;
        detail.appendChild(option);
      }
      const allOption = document.createElement("option");
      allOption.value = "all";
      allOption.textContent = "All levels";
      detail.appendChild(allOption);

      overviewLevel = treeDepth >= 1 ? 1 : "all";
      detail.value = String(overviewLevel);
    }

    // ---- Build node/link sets for the current view ----
    function buildOverview() {
      nodes.length = 0;
      links.length = 0;

      function recurse(node, depth, parentEntry) {
        const isLeaf = !(node.children && node.children.length);
        // Show nodes exactly at this level, plus any class shallower than it (a class can't
        // be subdivided, so it must still appear at deeper levels). => deepest level = all classes.
        const visible = depth >= 1 && (
          overviewLevel === "all" ||
          depth === overviewLevel ||
          (depth < overviewLevel && isLeaf)
        );
        let entry = parentEntry;
        if (visible) {
          entry = { ...node, depth, children: node.children || [], side: "tree" };
          nodes.push(entry);
          if (overviewLevel === "all" && parentEntry) {
            links.push({ source: parentEntry, target: entry, dep: false });
          }
        }
        // Stop descending once we reach the selected level (in band mode).
        if (overviewLevel === "all" || depth < overviewLevel) {
          (node.children || []).forEach((child) =>
            recurse(child, depth + 1, overviewLevel === "all" ? entry : null)
          );
        }
      }

      recurse(repoTree, 0, null);
      addOverviewDependencyLinks();
    }

    // Aggregate class-to-class dependencies up to whichever nodes are currently visible:
    // at the class level you see direct links; at group levels you see how areas connect.
    function addOverviewDependencyLinks() {
      if (!repoEdges.length || !nodes.length) return;

      const fqnToNode = new Map();
      [...nodes].sort((a, b) => b.depth - a.depth).forEach((node) => {
        const classes = node.kind === "class" ? [node] : collectLeafClasses(node, []);
        classes.forEach((c) => {
          if (!fqnToNode.has(c.path)) fqnToNode.set(c.path, node);
        });
      });

      const seen = new Set();
      repoEdges.forEach((edge) => {
        const source = fqnToNode.get(edge.source);
        const target = fqnToNode.get(edge.target);
        if (!source || !target || source === target) return;
        const key = source.path + "" + target.path;
        if (seen.has(key)) return;
        seen.add(key);
        links.push({ source, target, dep: true });
      });
    }

    function buildFocus() {
      nodes.length = 0;
      links.length = 0;

      const focusEntry = indexByPath.get(focusPath);
      if (!focusEntry) return;

      const own = collectLeafClasses(focusEntry.node, []);
      const ownPaths = new Set(own.map((c) => c.path));
      const byPath = new Map();

      function ensure(node, side, group) {
        if (byPath.has(node.path)) return byPath.get(node.path);
        const entry = {
          name: node.name,
          kind: side === "own" ? "class" : "feature",
          path: node.path,
          summary: side === "own"
            ? (node.summary || "")
            : "Depended on by " + focusName + " · group: " + group,
          group,
          side,
          depth: 1,
          children: []
        };
        byPath.set(node.path, entry);
        nodes.push(entry);
        return entry;
      }

      own.forEach((c) => ensure(c, "own", focusName));

      function resolveEntry(path, isOwn) {
        if (isOwn) return byPath.get(path) || null;
        const t = indexByPath.get(path);
        if (t && t.node.kind === "class") return ensure(t.node, "ext", t.group);
        return null;
      }

      // Show dependencies in BOTH directions: classes this group uses, and classes
      // elsewhere that use this group. So drilling into any group reveals its interactions.
      repoEdges.forEach((edge) => {
        const sourceOwn = ownPaths.has(edge.source);
        const targetOwn = ownPaths.has(edge.target);
        if (!sourceOwn && !targetOwn) return;

        const sourceEntry = resolveEntry(edge.source, sourceOwn);
        const targetEntry = resolveEntry(edge.target, targetOwn);
        if (sourceEntry && targetEntry && sourceEntry !== targetEntry) {
          links.push({ source: sourceEntry, target: targetEntry, dep: true });
        }
      });
    }

    // ---- Layouts ----
    function layoutOverview() {
      const width = svg.clientWidth || 900;
      const height = svg.clientHeight || 650;
      const cx = width / 2;
      const cy = height / 2;

      const byDepth = new Map();
      nodes.forEach((node) => {
        if (!byDepth.has(node.depth)) byDepth.set(node.depth, []);
        byDepth.get(node.depth).push(node);
      });

      const depths = [...byDepth.keys()].sort((a, b) => a - b);
      const maxD = Math.max(...depths, 1);
      const radiusStep = Math.min(width, height) / (maxD + 2.0);

      depths.forEach((depth) => {
        const arr = byDepth.get(depth);
        const radius = radiusStep * depth;
        const offset = depth % 2 === 0 ? Math.PI / arr.length : 0;
        arr.forEach((node, index) => {
          if (arr.length === 1 && depth === 0) {
            node.x = cx;
            node.y = cy;
            return;
          }
          const angle = (Math.PI * 2 * index) / arr.length + offset;
          node.x = cx + Math.cos(angle) * radius;
          node.y = cy + Math.sin(angle) * radius;
        });
      });
    }

    function layoutFocus() {
      const width = svg.clientWidth || 900;
      const height = svg.clientHeight || 650;
      const own = nodes.filter((n) => n.side === "own");
      const ext = nodes.filter((n) => n.side === "ext");
      placeColumn(own, width * 0.34, height);
      placeColumn(ext, width * 0.7, height);
    }

    function placeColumn(arr, x, height) {
      const top = height * 0.12;
      const span = height * 0.76;
      arr.forEach((node, index) => {
        node.x = x;
        node.y = arr.length <= 1 ? height / 2 : top + (span * index) / (arr.length - 1);
      });
    }

    function pathData(link) {
      const sx = link.source.x;
      const sy = link.source.y;
      const tx = link.target.x;
      const ty = link.target.y;
      const mx = (sx + tx) / 2;
      const my = (sy + ty) / 2;
      return `M ${sx} ${sy} Q ${mx} ${my} ${tx} ${ty}`;
    }

    function render() {
      if (view === "focus") {
        buildFocus();
        layoutFocus();
      } else {
        buildOverview();
        layoutOverview();
      }

      if (!nodes.includes(state.selected)) {
        state.selected = nodes[0] || null;
      }

      linksLayer.replaceChildren();
      nodesLayer.replaceChildren();

      links.forEach((link) => {
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("class", link.dep ? "link dep" : "link");
        path.setAttribute("d", pathData(link));
        linksLayer.appendChild(path);
      });

      nodes.forEach((node) => {
        const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
        group.setAttribute("class", "node");
        group.dataset.kind = node.kind || "node";
        group.setAttribute("transform", `translate(${node.x}, ${node.y})`);
        group.tabIndex = 0;

        const color = colorFor(node);
        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        // Size by how many classes the node contains, so broad (higher-level) groups read
        // as visibly larger than sub-groups, and individual classes are the smallest.
        const count = node.kind === "class" ? 1 : (node.classCount || 1);
        const radius = node.kind === "class" ? 11 : Math.max(15, Math.min(36, 12 + Math.sqrt(count) * 3.2));
        circle.setAttribute("r", String(radius));
        circle.style.stroke = color;
        circle.style.fill = `color-mix(in srgb, ${color} 16%, var(--surface))`;

        const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
        label.setAttribute("x", "0");
        label.setAttribute("y", "30");
        label.setAttribute("text-anchor", "middle");
        label.textContent = node.name;

        const tooltip = document.createElementNS("http://www.w3.org/2000/svg", "title");
        const groupName = groupNameFor(node);
        tooltip.textContent = node.name +
          (groupName ? "\nGroup: " + groupName : "") +
          (node.path ? "\n" + node.path : "");

        group.append(tooltip, circle, label);
        group.addEventListener("click", () => {
          if (justDragged) { justDragged = false; return; }
          onNodeClick(node);
        });
        group.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            onNodeClick(node);
          }
        });
        nodesLayer.appendChild(group);
      });

      fitToScreen();
      updateSelection();
    }

    function updateTransform() {
      viewport.setAttribute("transform", `translate(${state.x}, ${state.y}) scale(${state.scale})`);
    }

    function onNodeClick(node) {
      if (view === "overview" && node.kind === "module") {
        enterFocus(node);
      } else {
        selectNode(node);
      }
    }

    function enterFocus(node) {
      view = "focus";
      focusPath = node.path;
      focusName = node.name;
      state.selected = null;
      backButton.classList.remove("hidden");
      render();
    }

    function exitFocus() {
      view = "overview";
      focusPath = null;
      focusName = null;
      state.selected = null;
      backButton.classList.add("hidden");
      render();
    }

    function selectNode(node) {
      state.selected = node;
      if (view !== "focus") {
        const targetScale = 1.2;
        state.scale = targetScale;
        state.x = svg.clientWidth / 2 - node.x * targetScale;
        state.y = svg.clientHeight / 2 - node.y * targetScale;
        updateTransform();
      }
      updateSelection();
    }

    function updateSelection() {
      const sel = state.selected;
      document.getElementById("repoName").textContent = repoTree.name;
      document.getElementById("breadcrumb").textContent =
        view === "focus" ? ("Focus: " + focusName) : "Architecture overview";
      document.getElementById("selectedName").textContent = sel ? sel.name : "Nothing selected";
      document.getElementById("selectedKind").textContent = sel ? (sel.kind || "node") : "";

      const parentEl = document.getElementById("selectedParent");
      if (sel) {
        const groupName = groupNameFor(sel);
        if (sel.kind === "module" && groupName === sel.name) {
          parentEl.textContent = "Top-level group";
        } else {
          parentEl.textContent = groupName ? "In group: " + groupName : "";
        }
      } else {
        parentEl.textContent = "";
      }

      document.getElementById("selectedSummary").textContent =
        sel ? (sel.summary || "No summary available yet.") : "";

      const hint = document.getElementById("hint");
      if (view === "overview") {
        hint.textContent =
          "Scroll: change level · Ctrl+scroll: zoom · click a group to drill in. " +
          repoEdges.length + " dependencies detected project-wide.";
      } else {
        hint.textContent =
          "Scroll to zoom. Arrows show dependencies in both directions between this group and the rest of the project.";
      }

      document.getElementById("nodeCount").textContent = `${nodes.length} nodes`;
      document.getElementById("depthCount").textContent =
        view === "focus"
          ? "drill-in view"
          : (overviewLevel === "all" ? "all levels" : "level " + overviewLevel);

      [...nodesLayer.children].forEach((element, index) => {
        element.classList.toggle("selected", nodes[index] === state.selected);
      });
      applySearch(search.value);
    }

    function applySearch(value) {
      const query = value.trim().toLowerCase();
      [...nodesLayer.children].forEach((element, index) => {
        const node = nodes[index];
        const haystack = `${node.name} ${node.kind || ""} ${node.summary || ""}`.toLowerCase();
        element.classList.toggle("dim", query.length > 0 && !haystack.includes(query));
      });
    }

    function fitToScreen() {
      state.scale = 0.92;
      state.x = svg.clientWidth * 0.04;
      state.y = svg.clientHeight * 0.04;
      updateTransform();
    }

    function reset() {
      search.value = "";
      if (view === "focus") {
        exitFocus();
      } else {
        fitToScreen();
        updateSelection();
      }
    }

    search.addEventListener("input", (event) => applySearch(event.target.value));
    resetButton.addEventListener("click", reset);
    fitButton.addEventListener("click", fitToScreen);
    backButton.addEventListener("click", exitFocus);
    detail.addEventListener("change", () => {
      overviewLevel = detail.value === "all" ? "all" : Number(detail.value);
      if (view === "focus") exitFocus();
      else render();
    });

    function zoomAt(event) {
      const direction = event.deltaY > 0 ? -1 : 1;
      const nextScale = Math.min(2.6, Math.max(0.42, state.scale + direction * 0.12));
      const rect = svg.getBoundingClientRect();
      const px = event.clientX - rect.left;
      const py = event.clientY - rect.top;
      const worldX = (px - state.x) / state.scale;
      const worldY = (py - state.y) / state.scale;
      state.scale = nextScale;
      state.x = px - worldX * state.scale;
      state.y = py - worldY * state.scale;
      updateTransform();
    }

    function changeLevel(delta) {
      if (treeDepth < 1) return;
      const current = overviewLevel === "all" ? treeDepth : overviewLevel;
      const next = Math.max(1, Math.min(treeDepth, current + delta));
      if (next === overviewLevel) return;
      overviewLevel = next;
      detail.value = String(next);
      render();
    }

    let wheelAccum = 0;
    const WHEEL_STEP = 80;

    svg.addEventListener("wheel", (event) => {
      event.preventDefault();

      // Ctrl/Cmd + scroll = visual zoom. Inside the drill-in view there are no levels,
      // so plain scroll zooms there too.
      if (event.ctrlKey || event.metaKey || view === "focus") {
        wheelAccum = 0;
        zoomAt(event);
        return;
      }

      // Plain scroll in the overview = change detail level (scroll up = more detail).
      wheelAccum += event.deltaY;
      if (Math.abs(wheelAccum) < WHEEL_STEP) return;
      const direction = wheelAccum > 0 ? -1 : 1;
      wheelAccum = 0;
      changeLevel(direction);
    }, { passive: false });

    // Only start panning (and capture the pointer) once the cursor actually moves past a
    // small threshold. A plain click never captures, so node click handlers fire reliably.
    let pointerStart = null;
    let justDragged = false;

    svg.addEventListener("pointerdown", (event) => {
      pointerStart = { x: event.clientX, y: event.clientY, id: event.pointerId };
      state.lastPointer = { x: event.clientX, y: event.clientY };
      state.dragging = false;
      justDragged = false;
    });

    svg.addEventListener("pointermove", (event) => {
      if (!pointerStart || !state.lastPointer) return;
      if (!state.dragging) {
        const moved = Math.hypot(event.clientX - pointerStart.x, event.clientY - pointerStart.y);
        if (moved < 4) return;
        state.dragging = true;
        try { svg.setPointerCapture(pointerStart.id); } catch (e) { /* ignore */ }
      }
      state.x += event.clientX - state.lastPointer.x;
      state.y += event.clientY - state.lastPointer.y;
      state.lastPointer = { x: event.clientX, y: event.clientY };
      updateTransform();
    });

    svg.addEventListener("pointerup", (event) => {
      if (state.dragging) {
        justDragged = true; // suppress the click that follows a drag
        try { svg.releasePointerCapture(event.pointerId); } catch (e) { /* ignore */ }
      }
      state.dragging = false;
      pointerStart = null;
      state.lastPointer = null;
    });

    window.addEventListener("resize", () => render());

    populateDetail();
    render();
  </script>
</body>
</html>
