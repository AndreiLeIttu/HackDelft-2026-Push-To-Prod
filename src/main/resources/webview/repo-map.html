<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Repo Map</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f8f4;
      --surface: #ffffff;
      --text: #202124;
      --muted: #687078;
      --line: #d9ded7;
      --accent: #0f766e;
      --accent-2: #c2410c;
      --accent-3: #2563eb;
      --shadow: 0 14px 34px rgba(30, 35, 40, 0.12);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #171a1d;
        --surface: #20252a;
        --text: #edf1f4;
        --muted: #a5adb5;
        --line: #364049;
        --shadow: 0 14px 34px rgba(0, 0, 0, 0.3);
      }
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "Segoe UI", system-ui, sans-serif;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      width: 100%;
      height: 100%;
      min-width: 320px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .title {
      min-width: 0;
    }

    .title strong,
    .title span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .title strong {
      font-size: 14px;
      line-height: 20px;
    }

    .title span {
      color: var(--muted);
      font-size: 12px;
      line-height: 16px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .search {
      width: min(280px, 38vw);
      min-width: 150px;
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      color: var(--text);
      background: var(--bg);
      outline: none;
    }

    .button {
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 11px;
      color: var(--text);
      background: var(--surface);
      cursor: pointer;
    }

    .button:hover {
      border-color: var(--accent);
    }

    .stage {
      position: relative;
      min-height: 0;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
      user-select: none;
    }

    svg:active {
      cursor: grabbing;
    }

    .link {
      fill: none;
      stroke: var(--line);
      stroke-width: 2;
    }

    .node circle {
      fill: var(--surface);
      stroke: var(--accent-3);
      stroke-width: 2;
      filter: drop-shadow(0 3px 5px rgba(30, 35, 40, 0.18));
    }

    .node[data-kind="repository"] circle {
      fill: var(--accent);
      stroke: var(--accent);
    }

    .node[data-kind="module"] circle {
      stroke: var(--accent);
    }

    .node[data-kind="feature"] circle {
      stroke: var(--accent-2);
    }

    .node text {
      fill: var(--text);
      font-size: 12px;
      paint-order: stroke;
      stroke: var(--bg);
      stroke-width: 4px;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .node.selected circle {
      stroke-width: 4;
    }

    .node.dim {
      opacity: 0.22;
    }

    .panel {
      position: absolute;
      right: 14px;
      bottom: 14px;
      width: min(360px, calc(100% - 28px));
      max-height: calc(100% - 28px);
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: color-mix(in srgb, var(--surface) 94%, transparent);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .panel h2 {
      margin: 0 0 4px;
      font-size: 16px;
      line-height: 22px;
    }

    .panel .kind {
      margin-bottom: 10px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .panel p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 19px;
    }

    .stats {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 640px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      .controls {
        justify-content: flex-start;
      }

      .search {
        width: 100%;
      }

      .panel {
        left: 10px;
        right: 10px;
        bottom: 10px;
        width: auto;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="toolbar">
      <div class="title">
        <strong id="repoName">Repo Map</strong>
        <span id="breadcrumb">Repository overview</span>
      </div>
      <div class="controls">
        <input id="search" class="search" type="search" placeholder="Search nodes">
        <button id="reset" class="button" type="button">Reset</button>
        <button id="fit" class="button" type="button">Fit</button>
      </div>
    </header>

    <section class="stage" aria-label="Repository map">
      <svg id="map" role="img" aria-label="Interactive repository map"></svg>
      <aside class="panel" aria-live="polite">
        <h2 id="selectedName"></h2>
        <div id="selectedKind" class="kind"></div>
        <p id="selectedSummary"></p>
        <div class="stats">
          <span id="nodeCount"></span>
          <span id="depthCount"></span>
        </div>
      </aside>
    </section>
  </main>

  <script>
    const repoTree = __REPO_TREE_JSON__;
    const svg = document.getElementById("map");
    const viewport = document.createElementNS("http://www.w3.org/2000/svg", "g");
    const linksLayer = document.createElementNS("http://www.w3.org/2000/svg", "g");
    const nodesLayer = document.createElementNS("http://www.w3.org/2000/svg", "g");
    const search = document.getElementById("search");
    const resetButton = document.getElementById("reset");
    const fitButton = document.getElementById("fit");

    svg.appendChild(viewport);
    viewport.appendChild(linksLayer);
    viewport.appendChild(nodesLayer);

    const state = {
      scale: 1,
      x: 0,
      y: 0,
      selected: null,
      dragging: false,
      dragStart: null,
      lastPointer: null
    };

    const nodes = [];
    const links = [];

    function walk(node, depth = 0, parent = null, path = []) {
      const entry = {
        ...node,
        depth,
        parent,
        path: [...path, node.name],
        children: node.children || []
      };
      nodes.push(entry);
      if (parent) {
        links.push({ source: parent, target: entry });
      }
      entry.children.forEach((child) => walk(child, depth + 1, entry, entry.path));
      return entry;
    }

    const root = walk(repoTree);
    state.selected = root;

    function layout() {
      const width = svg.clientWidth || 900;
      const height = svg.clientHeight || 650;
      const levels = new Map();
      nodes.forEach((node) => {
        if (!levels.has(node.depth)) {
          levels.set(node.depth, []);
        }
        levels.get(node.depth).push(node);
      });

      const maxDepth = Math.max(...nodes.map((node) => node.depth), 1);
      const centerX = width / 2;
      const centerY = height / 2;
      const radiusStep = Math.min(width, height) / (maxDepth + 2.4);

      root.x = centerX;
      root.y = centerY;

      levels.forEach((levelNodes, depth) => {
        if (depth === 0) {
          return;
        }
        const radius = radiusStep * depth;
        const offset = depth % 2 === 0 ? Math.PI / levelNodes.length : 0;
        levelNodes.forEach((node, index) => {
          const angle = (Math.PI * 2 * index) / levelNodes.length + offset;
          node.x = centerX + Math.cos(angle) * radius;
          node.y = centerY + Math.sin(angle) * radius;
        });
      });
    }

    function pathData(link) {
      const sx = link.source.x;
      const sy = link.source.y;
      const tx = link.target.x;
      const ty = link.target.y;
      const mx = (sx + tx) / 2;
      const my = (sy + ty) / 2;
      return `M ${sx} ${sy} Q ${mx} ${my} ${tx} ${ty}`;
    }

    function render() {
      layout();
      linksLayer.replaceChildren();
      nodesLayer.replaceChildren();

      links.forEach((link) => {
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("class", "link");
        path.setAttribute("d", pathData(link));
        linksLayer.appendChild(path);
      });

      nodes.forEach((node) => {
        const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
        group.setAttribute("class", "node");
        group.dataset.kind = node.kind || "node";
        group.setAttribute("transform", `translate(${node.x}, ${node.y})`);
        group.tabIndex = 0;

        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("r", String(node.depth === 0 ? 24 : node.children.length ? 18 : 13));

        const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
        label.setAttribute("x", "0");
        label.setAttribute("y", String(node.depth === 0 ? 40 : 30));
        label.setAttribute("text-anchor", "middle");
        label.textContent = node.name;

        group.append(circle, label);
        group.addEventListener("click", () => selectNode(node));
        group.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            selectNode(node);
          }
        });
        nodesLayer.appendChild(group);
      });

      fitToScreen();
      updateSelection();
    }

    function updateTransform() {
      viewport.setAttribute("transform", `translate(${state.x}, ${state.y}) scale(${state.scale})`);
    }

    function selectNode(node) {
      state.selected = node;
      const targetScale = node.depth === 0 ? 1 : 1.35;
      state.scale = targetScale;
      state.x = svg.clientWidth / 2 - node.x * targetScale;
      state.y = svg.clientHeight / 2 - node.y * targetScale;
      updateSelection();
      updateTransform();
    }

    function updateSelection() {
      document.getElementById("repoName").textContent = repoTree.name;
      document.getElementById("breadcrumb").textContent = state.selected.path.join(" / ");
      document.getElementById("selectedName").textContent = state.selected.name;
      document.getElementById("selectedKind").textContent = state.selected.kind || "node";
      document.getElementById("selectedSummary").textContent = state.selected.summary || "No summary available yet.";
      document.getElementById("nodeCount").textContent = `${nodes.length} nodes`;
      document.getElementById("depthCount").textContent = `${Math.max(...nodes.map((node) => node.depth)) + 1} levels`;

      [...nodesLayer.children].forEach((element, index) => {
        const node = nodes[index];
        element.classList.toggle("selected", node === state.selected);
      });
      applySearch(search.value);
    }

    function applySearch(value) {
      const query = value.trim().toLowerCase();
      [...nodesLayer.children].forEach((element, index) => {
        const node = nodes[index];
        const haystack = `${node.name} ${node.kind || ""} ${node.summary || ""}`.toLowerCase();
        element.classList.toggle("dim", query.length > 0 && !haystack.includes(query));
      });
    }

    function fitToScreen() {
      state.scale = 0.92;
      state.x = svg.clientWidth * 0.04;
      state.y = svg.clientHeight * 0.04;
      updateTransform();
    }

    function reset() {
      search.value = "";
      state.selected = root;
      fitToScreen();
      updateSelection();
    }

    search.addEventListener("input", (event) => applySearch(event.target.value));
    resetButton.addEventListener("click", reset);
    fitButton.addEventListener("click", fitToScreen);

    svg.addEventListener("wheel", (event) => {
      event.preventDefault();
      const direction = event.deltaY > 0 ? -1 : 1;
      const nextScale = Math.min(2.6, Math.max(0.42, state.scale + direction * 0.12));
      const rect = svg.getBoundingClientRect();
      const px = event.clientX - rect.left;
      const py = event.clientY - rect.top;
      const worldX = (px - state.x) / state.scale;
      const worldY = (py - state.y) / state.scale;
      state.scale = nextScale;
      state.x = px - worldX * state.scale;
      state.y = py - worldY * state.scale;
      updateTransform();
    }, { passive: false });

    svg.addEventListener("pointerdown", (event) => {
      state.dragging = true;
      state.lastPointer = { x: event.clientX, y: event.clientY };
      svg.setPointerCapture(event.pointerId);
    });

    svg.addEventListener("pointermove", (event) => {
      if (!state.dragging || !state.lastPointer) {
        return;
      }
      state.x += event.clientX - state.lastPointer.x;
      state.y += event.clientY - state.lastPointer.y;
      state.lastPointer = { x: event.clientX, y: event.clientY };
      updateTransform();
    });

    svg.addEventListener("pointerup", () => {
      state.dragging = false;
      state.lastPointer = null;
    });

    window.addEventListener("resize", () => {
      render();
    });

    render();
  </script>
</body>
</html>
